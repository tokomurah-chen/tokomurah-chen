<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印尼越南食品店</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f9f9f9;color:#222;font-size:15px}
:root{--red:#C8102E;--light:#fff5f5;--border:#f0d0d0;--green:#06C755}
nav{background:var(--red);color:#fff;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:54px}
.nav-logo{font-size:16px;font-weight:500;cursor:pointer}
.nav-right{display:flex;align-items:center;gap:6px}
.lang-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:4px 9px;border-radius:14px;cursor:pointer;font-size:12px}
.lang-btn.active{background:#fff;color:var(--red);font-weight:500}
.cart-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:5px 11px;border-radius:14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px}
.cart-count{background:#fff;color:var(--red);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
#delivery-bar{background:#fff3cd;border-bottom:1px solid #ffc107;padding:10px 1rem;text-align:center;font-size:13px;color:#856404;position:sticky;top:54px;z-index:95}
.hero{background:var(--red);color:#fff;text-align:center;padding:2rem 1rem 1.5rem}
.hero h1{font-size:22px;font-weight:500;margin-bottom:6px}
.hero p{font-size:13px;opacity:0.85}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:98px;z-index:90;overflow-x:auto}
.tab{flex:1;min-width:80px;padding:11px 6px;text-align:center;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:500}
.section{display:none;padding:1rem}
.section.active{display:block}
.cat-title{font-size:14px;font-weight:500;color:var(--red);margin:1rem 0 0.6rem;padding-left:4px;border-left:3px solid var(--red)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:1rem}
.card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
.card-img{width:100%;height:120px;display:flex;align-items:center;justify-content:center;font-size:38px;background:#fff8f8;border-bottom:1px solid var(--border);overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:9px}
.card-name{font-size:12px;font-weight:500;margin-bottom:2px;line-height:1.3;min-height:30px}
.card-price{color:var(--red);font-weight:500;font-size:13px;margin-bottom:7px}
select{width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:11px;margin-bottom:7px;background:#fff;color:#222}
.qty-row{display:flex;align-items:center;gap:5px}
.qty-btn{width:24px;height:24px;border:1px solid var(--border);background:#fff;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#555}
.qty-val{font-size:13px;font-weight:500;min-width:18px;text-align:center}
.add-btn{flex:1;background:var(--red);color:#fff;border:none;border-radius:6px;padding:5px 3px;font-size:11px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200}
.overlay.open{display:flex;align-items:flex-end}
.cart-panel{background:#fff;width:100%;max-height:88vh;border-radius:16px 16px 0 0;overflow-y:auto;padding:1.2rem}
.cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.cart-title-txt{font-size:16px;font-weight:500}
.close-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.cart-item-name{flex:1;padding-right:8px;line-height:1.4}
.cart-item-price{color:var(--red);font-weight:500;white-space:nowrap}
.cart-remove{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;margin-left:6px}
.cart-total-row{display:flex;justify-content:space-between;font-weight:500;padding:10px 0;font-size:15px;border-top:1px solid var(--border);margin-top:4px}
.cart-empty{text-align:center;color:#aaa;padding:2rem 0;font-size:14px}
.form-wrap{background:var(--light);border-radius:10px;padding:1rem;margin-top:1rem}
.form-wrap h3{font-size:13px;font-weight:500;margin-bottom:10px;color:var(--red)}
input,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:8px;color:#222;background:#fff;font-family:sans-serif}
textarea{height:65px;resize:none}
.submit-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;cursor:pointer;font-weight:500}
.about-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:10px}
.about-box h3{color:var(--red);font-size:14px;font-weight:500;margin-bottom:6px}
.about-box p{font-size:13px;color:#555;line-height:1.6}
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;align-items:center;justify-content:center;padding:1rem}
.admin-panel{background:#fff;border-radius:16px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto}
.admin-header{background:var(--red);color:#fff;padding:1rem 1.2rem;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center}
.admin-body{padding:1.2rem}
.admin-tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.admin-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-size:12px;background:#fff;color:#666}
.admin-tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.product-row{border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;background:#fff}
.product-row-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.edit-grid label{font-size:11px;color:#888;display:block;margin-bottom:2px}
.edit-grid input{margin-bottom:0;font-size:12px;padding:6px 8px}
.full-input{grid-column:1/-1}
.variant-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.variant-row input{margin-bottom:0;font-size:12px;padding:5px 8px}
.del-btn{background:none;border:1px solid #ffcccc;color:#e55;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;white-space:nowrap}
.add-product-btn{width:100%;border:2px dashed var(--border);background:none;border-radius:10px;padding:12px;cursor:pointer;color:#aaa;font-size:13px;margin-top:8px}
.login-box{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:320px;text-align:center}
.login-box h2{color:var(--red);margin-bottom:1rem;font-size:18px;font-weight:500}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:500;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<nav>
  <div class="nav-logo" id="nav-logo" onclick="logoClick()">🌿 印尼越南食品店</div>
  <div class="nav-right">
    <button class="lang-btn active" onclick="setLang('zh',this)">中文</button>
    <button class="lang-btn" onclick="setLang('id',this)">ID</button>
    <button class="lang-btn" onclick="setLang('vi',this)">VI</button>
    <button class="cart-btn" onclick="openCart()">🛒 <span class="cart-count" id="cart-count">0</span></button>
  </div>
</nav>
<div id="delivery-bar">🛵 <span id="delivery-msg"></span></div>
<div class="hero">
  <h1 id="hero-title">東南亞食品專賣店</h1>
  <p id="hero-sub">正宗印尼・越南食品，直送到府 🇮🇩 🇻🇳</p>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('id',this)">🇮🇩 <span id="tab-id">印尼商品</span></div>
  <div class="tab" onclick="showTab('vn',this)">🇻🇳 <span id="tab-vn">越南商品</span></div>
  <div class="tab" onclick="showTab('about',this)"><span id="tab-about">關於我們</span></div>
</div>
<div class="section active" id="sec-id"></div>
<div class="section" id="sec-vn"></div>
<div class="section" id="sec-about">
  <div class="about-box"><h3 id="a1t">關於我們</h3><p id="a1p"></p></div>
  <div class="about-box"><h3 id="a2t">訂購方式</h3><p id="a2p"></p></div>
  <div class="about-box"><h3 id="a3t">付款方式</h3><p id="a3p"></p></div>
  <div class="about-box"><h3 id="a4t">聯繫我們</h3><p id="a4p"></p></div>
</div>
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="cart-panel">
    <div class="cart-header">
      <span class="cart-title-txt" id="cart-title-el">購物車</span>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-total-row" id="cart-total-row" style="display:none">
      <span id="total-label-el">合計</span>
      <span id="total-price" style="color:var(--red)"></span>
    </div>
    <div class="form-wrap" id="order-form" style="display:none">
      <h3 id="form-title-el">填寫收件資料</h3>
      <input id="f-name" type="text" placeholder="姓名">
      <input id="f-phone" type="tel" placeholder="電話號碼"> 
      <input id="f-addr" type="text" placeholder="送貨地址">
      <textarea id="f-note" placeholder="備註（可留空）"></textarea>
      <button class="submit-btn" id="submit-btn" onclick="submitOrder()">送出訂單</button>
    </div>
  </div>
</div>
<div id="confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto">
    <div style="text-align:center;margin-bottom:1rem">
      <div style="font-size:40px">✅</div>
      <h2 id="confirm-title" style="font-size:17px;font-weight:500;color:var(--red);margin-top:8px">訂單已建立！</h2>
      <p id="confirm-sub" style="font-size:13px;color:#666;margin-top:4px">請複製訂單內容，傳送給我們的 LINE</p>
    </div>
    <div style="background:var(--light);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem">
      <pre id="confirm-text" style="font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:sans-serif;color:#333"></pre>
    </div>
    <button id="copy-btn" onclick="copyOrder()" style="width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;cursor:pointer;margin-bottom:8px">📋 複製訂單內容</button>

    <button id="close-confirm-btn" onclick="document.getElementById('confirm-overlay').style.display='none'" style="width:100%;background:none;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:#888">關閉</button>
  </div>
</div>
<div class="admin-overlay" id="admin-overlay">
  <div class="login-box" id="login-box">
    <h2>🔒 後台管理</h2>
    <p style="font-size:13px;color:#888;margin-bottom:1rem">請輸入管理員密碼</p>
    <input type="password" id="admin-pw" placeholder="密碼" style="margin-bottom:12px" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()" style="width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;cursor:pointer;font-weight:500">登入</button>
    <button onclick="closeAdmin()" style="width:100%;background:none;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;margin-top:8px;color:#888">取消</button>
    <p id="pw-err" style="color:var(--red);font-size:12px;margin-top:8px;display:none">密碼錯誤！</p>
  </div>
  <div class="admin-panel" id="admin-panel" style="display:none">
    <div class="admin-header">
      <h2>⚙️ 後台管理</h2>
      <button onclick="closeAdmin()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px">關閉</button>
    </div>
    <div class="admin-body">
      <div class="admin-tabs" id="admin-cat-tabs"></div>
      <div id="admin-products"></div>
      <button class="add-product-btn" onclick="addProduct()">＋ 新增商品</button>
      <button onclick="saveAll()" style="width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;cursor:pointer;font-weight:500;margin-top:12px">💾 儲存所有變更</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

let curLang='zh',cart=[],adminCat='id-0';
const SHEET_URL='https://script.google.com/macros/s/AKfycbxIB66mycDqMddDhDPRf9xgHQhIfwSqMtCpe2flraVfn846oTmldqohc8TbYMknwIj11g/exec';

async function loadPrices() {
  try {
    const res = await fetch(SHEET_URL + '?action=loadProducts');
    const data = await res.json();

    if (data.products) {
      products = data.products;
      console.log('✅ 從 Google Sheets 載入商品成功');
    } else {
      console.log('ℹ️ 尚無 Sheets 商品設定，使用預設資料並同步價格');
      await syncPricesOnly();
    }
    renderAll();
  } catch (e) {
    console.log('❌ 載入商品錯誤：' + e.message);
    await syncPricesOnly();
    renderAll();
  }
}

async function syncPricesOnly() {
  try {
    const applyPrices = (data, productList) => {
      data.forEach(row => {
        const keys = Object.keys(row);
        const nameKey = keys.find(k => k.replace(/\s+/g, '').includes('口味(中文)')) || '口味(中文)';
        const priceKey = keys.find(k => k.includes('價錢')) || '價錢';
        const rawName = (row[nameKey] || row['商品名稱'] || '').toString().replace(/\s+/g, '');
        const price = Number(row[priceKey]) || 0;
        if (!rawName || !price) return;
        for (const cat of productList) {
          for (const p of cat.items) {
            if (p.type === 'v') {
              p.v.forEach(v => { if (v.lz.replace(/\s+/g,'') === rawName) v.p = price; });
            } else {
              if (p.zh.replace(/\s+/g,'') === rawName) p.price = price;
            }
          }
        }
      });
    };
    const [r1, r2] = await Promise.all([
      fetch(SHEET_URL + '?sheet=印尼').then(r => r.json()),
      fetch(SHEET_URL + '?sheet=越南').then(r => r.json())
    ]);
    applyPrices(r1, products.id);
    applyPrices(r2, products.vn);
  } catch(e) {
    console.log('價格同步失敗:', e.message);
  }
}

</div>`;
cat.items.forEach(p=>{const row=document.createElement('div');row.className='product-row';const imgEl=p.img?`<img src="${p.img}" style="width:44px;height:44px;border-radius:6px;object-fit:cover;border:1px solid var(--border)">`:`<div style="width:44px;height:44px;border-radius:6px;background:#fff8f8;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px">${p.emoji}</div>`;let varHtml='';if(p.type==='v'){varHtml=`<div style="grid-column:1/-1"><label style="font-size:11px;color:#888;display:block;margin-bottom:4px">口味／規格</label>`+p.v.map((v,vi)=>`<div class="variant-row"><input value="${v.lz}" placeholder="中文" oninput="updV('${p.id}',${vi},'lz',this.value)"><input value="${v.l}" placeholder="越文/印尼文" oninput="updV('${p.id}',${vi},'l',this.value)"><input type="number" value="${v.p}" style="width:70px" oninput="updV('${p.id}',${vi},'p',+this.value)"><button class="del-btn" onclick="delV('${p.id}',${vi})">刪除</button></div>`).join('')+`<button onclick="addV('${p.id}')" style="background:none;border:1px dashed var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;color:#aaa;margin-top:4px">＋ 新增口味</button></div>`;}else{varHtml=`<div><label style="font-size:11px;color:#888;display:block;margin-bottom:2px">價格</label><input type="number" value="${p.price}" oninput="updF('${p.id}','price',+this.value)" style="margin-bottom:0;font-size:12px;padding:6px 8px"></div>`;}row.innerHTML=`<div class="product-row-header">${imgEl}<div style="flex:1"><div style="font-size:13px;font-weight:500">${p.zh}</div><div style="font-size:11px;color:#aaa">${p.type==='v'?'系列':'單品'}</div></div><button class="del-btn" onclick="delP('${p.id}')">刪除</button></div><div class="edit-grid"><div class="full-input"><label style="font-size:11px;color:#888;display:block;margin-bottom:2px">商品圖片網址</label><input value="${p.img||''}" placeholder="貼上 Cloudinary 圖片網址" oninput="updF('${p.id}','img',this.value)" style="margin-bottom:0;font-size:11px;padding:6px 8px"></div><div><label style="font-size:11px;color:#888;display:block;margin-bottom:2px">中文名稱</label><input value="${p.zh}" oninput="updF('${p.id}','zh',this.value)" style="margin-bottom:0;font-size:12px;padding:6px 8px"></div><div><label style="font-size:11px;color:#888;display:block;margin-bottom:2px">越文/印尼文名稱</label><input value="${p.id_||p.vi||''}" oninput="updF('${p.id}','id_',this.value)" style="margin-bottom:0;font-size:12px;padding:6px 8px"></div>${varHtml}</div>`;container.appendChild(row);});}
function updF(pid,f,v){const p=findP(pid);if(p)p[f]=v;}
function updV(pid,vi,f,v){const p=findP(pid);if(p&&p.v[vi])p.v[vi][f]=v;}
function delV(pid,vi){const p=findP(pid);if(p){p.v.splice(vi,1);renderAdminProducts();}}
function addV(pid){const p=findP(pid);if(p){p.v.push({l:'新規格',lz:'新規格',p:0});renderAdminProducts();}}
function delP(pid){const[country,idx]=adminCat.split('-');const cat=products[country][parseInt(idx)];cat.items=cat.items.filter(p=>p.id!==pid);renderAdminProducts();}
function addProduct(){const[country,idx]=adminCat.split('-');const cat=products[country][parseInt(idx)];cat.items.push({id:'p'+Date.now(),img:'',emoji:'🆕',zh:'新商品',id_:'Sản phẩm mới',vi:'Sản phẩm mới',type:'s',price:0});renderAdminProducts();}
async function saveAll() {
  const btn = document.querySelector('.admin-body button[onclick="saveAll()"]');
  if (btn) { btn.textContent = '⏳ 儲存中...'; btn.disabled = true; }
  try {
    const res = await fetch(SHEET_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveProducts', products }),
      headers: { 'Content-Type': 'text/plain' }
    });
    const result = await res.json();
    if (result.success) {
      renderAll();
      closeAdmin();
      showToast('✅ 已儲存到 Google Sheets！');
    } else {
      showToast('❌ 儲存失敗：' + result.error);
    }
  } catch (e) {
    showToast('❌ 網路錯誤：' + e.message);
  } finally {
    if (btn) { btn.textContent = '💾 儲存所有變更'; btn.disabled = false; }
  }
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
renderAll();
try{applyLang();}catch(e){console.log('applyLang錯誤:',e.message,e.stack);}
setTimeout(()=>{try{loadPrices();}catch(e){console.log('loadPrices錯誤:',e);}},500);
</script>
